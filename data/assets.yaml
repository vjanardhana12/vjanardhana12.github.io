# =============================================================================
# Assets manifest — single source of truth for everything published.
#
# Every entry shows up as a card on the matching section page (Tools/Guides/
# Videos/Snippets) AND on the homepage if `featured: true`.
#
# Add a new asset = append a new block here, push to GitHub. Done.
#
# Required fields:  title, type, description, visibility
# Optional fields:  tags, url, repo, video, doc, version, date, featured, internal_note
#
# type        : tool | guide | video | snippet
# visibility  : public | ms-internal | private
# url         : main link visitors should click (any URL)
# repo        : github repo (used to auto-fetch latest release)
# video       : youtube or vimeo URL (auto-embeds in card if type=video)
# featured    : true to surface on the homepage "Featured" strip
# =============================================================================

assets:

  - title: "D365 F&O MCP Onboarding Kit"
    type: tool
    description: >
      Self-service kit to onboard D365 F&O developers to MCP — includes a
      DevLead wizard, TFC and FC PowerShell setups, and a generic project-init
      flow. Works against any tenant/environment.
      
    tags: [D365FO, MCP, PowerShell, AI-ERP, Onboarding]
    visibility: ms-internal
    url: "https://github.com/mcaps-microsoft/D365FO-MCP-Onboarding"
    repo: "mcaps-microsoft/D365FO-MCP-Onboarding"
    date: 2026-04-23
    featured: true
    internal_note: "Public to Microsoft employees via mcaps-microsoft GitHub org."

  - title: "D365 F&O NuGet Sync Tool"
    type: tool
    description: >
      One-click sync of the 5 D365 F&O NuGet packages from LCS Shared Asset
      Library to your Azure DevOps Artifacts feed. Smart compare (skips what's
      already in the feed), parallel uploads, single 56 KB EXE, no install.
    tags: [D365FO, PowerShell, ALM, DevOps, NuGet, Azure-DevOps]
    visibility: public
    url: "https://github.com/vjanardhana12/d365fo-nuget-sync"
    repo: "vjanardhana12/d365fo-nuget-sync"
    download: "https://github.com/vjanardhana12/d365fo-nuget-sync/releases/latest/download/Sync-D365FONuGet.exe"
    version: "1.0.0"
    date: 2026-04-24
    featured: true
