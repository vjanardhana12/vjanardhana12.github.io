{{ define "main" }}
  {{ .Scratch.Set "scope" "single" }}
  <article class="proj-detail">
    {{/* Back to home button */}}
    <div style="margin-bottom:1.25rem;">
      <a href="/" style="display:inline-flex;align-items:center;gap:0.5rem;font-size:0.9rem;font-weight:500;padding:0.5rem 1rem;border-radius:10px;border:1px solid #22d3ee;color:#22d3ee;background:rgba(34,211,238,0.08);text-decoration:none;transition:all 0.15s;" onmouseover="this.style.background='rgba(34,211,238,0.18)';this.style.transform='translateX(-2px)';" onmouseout="this.style.background='rgba(34,211,238,0.08)';this.style.transform='translateX(0)';">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M14.7 5.3a1 1 0 0 1 0 1.4L9.4 12l5.3 5.3a1 1 0 1 1-1.4 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.4 0Z"/></svg>
        Back to home
      </a>
    </div>

    {{/* Header */}}
    <header id="single_header" class="mt-2">
      <h1 class="mt-0 text-4xl font-extrabold text-neutral-900 dark:text-neutral">
        {{ .Title | emojify }}
      </h1>
      <div class="mt-1 mb-6 text-base text-neutral-500 dark:text-neutral-400 print:hidden">
        {{ partial "article-meta/basic.html" (dict "context" . "scope" "single") }}
      </div>
    </header>

    {{/* Body */}}
    <section class="mt-0 prose dark:prose-invert proj-body">
      <div class="article-content mb-20">
        {{ .Content }}
      </div>
    </section>
  </article>

  <style>
    /* Match home page: expand body beyond max-w-7xl, reduce huge side padding */
    body {
      max-width: 100% !important;
      padding-left: 1.5rem !important;
      padding-right: 1.5rem !important;
    }
    @media (min-width: 1024px) {
      body {
        padding-left: 3rem !important;
        padding-right: 3rem !important;
      }
    }
    /* Theme wraps every page in <main class="max-w-3xl"> (~768px).
       Override for project detail pages so we use the full container. */
    main {
      max-width: 100% !important;
    }
    /* Project detail: use full available width like the home page */
    .proj-detail {
      max-width: 100% !important;
      width: 100% !important;
    }
    .proj-body,
    .proj-detail .article-content,
    .proj-detail #single_header {
      max-width: 100% !important;
    }
    /* Keep prose readable: cap copy column on very wide screens */
    .proj-detail .article-content > p,
    .proj-detail .article-content > ul,
    .proj-detail .article-content > ol,
    .proj-detail .article-content > blockquote {
      max-width: 75ch;
    }
    /* But let code blocks, tables, images use full width */
    .proj-detail .article-content > pre,
    .proj-detail .article-content > table,
    .proj-detail .article-content > figure,
    .proj-detail .article-content > .highlight {
      max-width: 100%;
    }
  </style>
{{ end }}
