# Blowfish theme params — main configuration

colorScheme = "blowfish"          # try also: "avocado", "fire", "ocean", "slate", "congo"
defaultAppearance = "dark"        # "light" or "dark"
autoSwitchAppearance = true       # follows OS setting

enableSearch = true
enableCodeCopy = true

mainSections = ["blog", "projects", "guides", "videos", "snippets"]
robots = "index, follow"
disableImageOptimization = false
disableTextInHeader = false

# Future: paste GoatCounter / Plausible site code here
# [params.analytics.goatcounter]
#   code = "your-site-code"

[header]
  layout = "fixed"                # "basic", "fixed", "fixed-fill", "fixed-fill-blur"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"              # "page", "profile", "hero", "card", "background", "custom"
  homepageImage = ""              # optional hero image
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/blog/"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true

[article]
  showDate = true
  showDateUpdated = true
  showAuthor = true
  showHero = true
  heroStyle = "background"        # "basic", "big", "background", "thumbAndBackground"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showAuthorBottom = false
  showWordCount = false
  showSummary = true
  sharingLinks = ["linkedin", "twitter", "email"]
  showZenMode = true

[list]
  showHero = false
  layoutBackgroundBlur = true
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  showCards = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false
  constrainItemsWidth = true

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = false
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = false
  cardView = true

[term]
  showHero = false
  showBreadcrumbs = true
  showViews = false
  showLikes = false
  showTableOfContents = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false

[firebase]
  apiKey = ""
  authDomain = ""
  projectId = ""
  storageBucket = ""
  messagingSenderId = ""
  appId = ""
  measurementId = ""

[fathomAnalytics]
  site = ""
  domain = ""

[umamiAnalytics]
  websiteid = ""
  domain = ""
  dataDomains = ""

[selineAnalytics]
  token = ""
  apiHost = ""

[buymeacoffee]
  identifier = ""
  globalWidget = false
  globalWidgetMessage = ""
  globalWidgetColor = ""
  globalWidgetPosition = ""

[verification]
