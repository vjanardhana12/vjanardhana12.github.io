baseURL = "https://vjanardhana12.github.io/"
defaultContentLanguage = "en"
languageCode = "en"
title = "Vinod Kumar K J"
theme = "blowfish"

enableRobotsTXT = true
enableEmoji = true
summaryLength = 0

# Output formats Blowfish needs (RSS + JSON for search)
[outputs]
home = ["HTML", "RSS", "JSON"]

[pagination]
pagerSize = 12

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
